name: Version check

on:
  pull_request:
    branches: [main]

jobs:
  version-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Полная история нужна, чтобы прочитать package.json из базовой ветки.
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check version bump
        run: node scripts/check-version.mjs "origin/${{ github.base_ref }}"
